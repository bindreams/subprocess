name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded runs on PRs; let main / dispatch runs finish.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # setup-rust so the cargo-fmt / cargo-clippy prek hooks (language = "system")
      # find a toolchain.
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt, clippy

      # prek.toml is the single source of truth for lint — the same checks run
      # locally as git hooks. prek-action runs `prek run --all-files`.
      - uses: j178/prek-action@v2

  test:
    name: Test (${{ matrix.os }}/${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: darwin
            arch: arm64
            runner: macos-latest
            target: aarch64-apple-darwin
          - os: darwin
            arch: amd64
            runner: macos-15
            target: x86_64-apple-darwin
          - os: windows
            arch: amd64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows
            arch: arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-rust
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --locked --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --locked --target ${{ matrix.target }}
